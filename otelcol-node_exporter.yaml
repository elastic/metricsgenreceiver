receivers:
  metricsgen:
    start_now_minus: 1h
    interval: 5s
    interval_jitter_std_dev: 1ms
    real_time: false
    exit_after_end: true
    seed: 123
    scenarios:
      - path: builtin/node_exporter
        scale: 100

exporters:
  prometheusremotewrite/elasticsearch:
    endpoint: "https://<es_endpoint>/_prometheus/api/v1/write"
    # This node_exporter scenario stores some info-metric labels on resource attributes
    # to leverage the existing per-instance templating there.
    # Remote write must copy those resource attributes back onto the metric series.
    resource_to_telemetry_conversion:
      enabled: true
    remote_write_queue:
      num_consumers: 10

service:
  pipelines:
    metrics:
      receivers: [metricsgen]
      exporters: [prometheusremotewrite/elasticsearch]
