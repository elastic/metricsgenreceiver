      value:
        stringValue: Debian GNU/Linux
    - key: pretty_name
      value:
        stringValue: Debian GNU/Linux 12 (bookworm)
    - key: variant
      value:
        stringValue: ''
    - key: variant_id
      value:
        stringValue: ''
