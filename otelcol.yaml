extensions:
  basicauth/client:
    client_auth:
      username: elastic
      password: password

exporters:
  elasticsearch:
    endpoint: http://localhost:9200
    sending_queue:
      enabled: true
      num_consumers: 10
      sizer: bytes
      queue_size: 50_000_000
      block_on_overflow: true
      batch:
        flush_timeout: 1s
        min_size: 1_000_000
        max_size: 4_000_000
  elasticsearch/elastic-package:
    endpoint: https://localhost:9200
    user: elastic
    password: changeme
    tls:
      insecure_skip_verify: true
    sending_queue:
      enabled: true
      num_consumers: 10
      sizer: bytes
      queue_size: 50_000_000
      block_on_overflow: true
      batch:
        flush_timeout: 1s
        min_size: 1_000_000
        max_size: 4_000_000
  otlphttp/elasticsearch:
    compression: gzip
    endpoint: http://localhost:9200/_otlp
    #headers:
    #  Authorization: ApiKey <key>
    sending_queue:
      enabled: true
      num_consumers: 10
      sizer: bytes
      queue_size: 50_000_000
      block_on_overflow: true
      batch:
        flush_timeout: 1s
        min_size: 1_000_000
        max_size: 4_000_000
  prometheusremotewrite/elasticsearch:
    endpoint: https://localhost:9200/_prometheus/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true
    target_info:
      enabled: false
    remote_write_queue:
      num_consumers: 10

service:
  pipelines:
    metrics:
      receivers: [metricsgen]
#      exporters: [elasticsearch/elastic-package]
      exporters: [otlphttp/elasticsearch]
